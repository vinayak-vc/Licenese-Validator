<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trial Licensing Admin Panel</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Trial Licensing Admin</h1>
      <p class="muted">Manage clients, revoke trials, and extend access.</p>

      <section class="card" id="authCard">
        <h2>Admin Login</h2>
        <label>Email</label>
        <input id="email" type="email" placeholder="admin@example.com" />
        <label>Password</label>
        <input id="password" type="password" placeholder="********" />
        <button id="loginBtn">Login</button>
        <p id="authStatus" class="muted"></p>
      </section>

      <section class="card hidden" id="panelCard">
        <div class="row">
          <h2>Admin Actions</h2>
          <button id="logoutBtn" class="secondary">Logout</button>
        </div>

        <div class="grid">
          <form id="createProjectForm" class="form-block">
            <h3>Create Project</h3>
            <input id="projectName" placeholder="Project name" required />
            <input id="projectDescription" placeholder="Project description" />
            <button type="submit">Create Project</button>
          </form>

          <div class="form-block">
            <h3>Select Project</h3>
            <select id="projectSelect"></select>
            <button id="refreshProjectsBtn" type="button">Refresh Projects</button>
            <p id="selectedProjectInfo" class="muted">No project selected.</p>
            <label>Project API Key</label>
            <div class="inline-actions">
              <input id="projectApiKeyField" readonly placeholder="Project API key will appear here" />
              <button id="copyProjectApiKeyBtn" type="button">Copy</button>
            </div>
            <p id="projectApiKeyHint" class="muted"></p>
          </div>

          <form id="createClientForm" class="form-block">
            <h3>Add New Client</h3>
            <input id="createDeviceId" placeholder="deviceId" required />
            <input id="createOs" placeholder="OS" required />
            <input id="createCpu" placeholder="CPU" required />
            <input id="createGpu" placeholder="GPU" required />
            <input id="createDays" type="number" placeholder="trialDays (1-365)" value="7" />
            <button type="submit">Create Client Trial</button>
          </form>

          <form id="extendForm" class="form-block">
            <h3>Extend Trial</h3>
            <input id="extendDeviceId" placeholder="deviceId" required />
            <input id="extendDays" type="number" placeholder="extendDays (1-365)" value="7" required />
            <button type="submit">Extend Trial</button>
          </form>

          <form id="revokeForm" class="form-block">
            <h3>Revoke Trial</h3>
            <input id="revokeDeviceId" placeholder="deviceId" required />
            <button type="submit" class="danger">Revoke Now</button>
          </form>
        </div>
      </section>

      <section class="card hidden" id="clientsCard">
        <div class="row row-gap">
          <h2>Registered Clients</h2>
          <div class="inline-actions">
            <input id="searchInput" placeholder="Search deviceId..." />
            <button id="refreshBtn">Refresh</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Device ID</th>
                <th>Status</th>
                <th>Trial End</th>
                <th>System</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="clientsTableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="card">
        <h2>API Response</h2>
        <pre id="output">{}</pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
  </html>
